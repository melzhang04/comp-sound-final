<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CinematicAI</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="grain"></div>

  <header>
    <div class="header-left">
      <h1>CinematicAI</h1>
      <span class="tagline">text → film score</span>
    </div>
    <div class="header-right">
      <span class="status-dot" id="statusDot"></span>
      <span class="status-text" id="statusText">idle</span>
    </div>
  </header>

  <main>

    <!-- Left: visualizer + phrase legend -->
    <section class="visualizer-section">
      <div class="screen-frame">
        <canvas id="visualizerCanvas"></canvas>
        <div class="screen-overlay" id="screenOverlay">
          <span class="screen-prompt">enter a scene to begin</span>
        </div>
      </div>
      <div class="phrase-legend">
        <div class="legend-items">
          <span class="legend-item"><span class="legend-dot ld-i"></span>intro</span>
          <span class="legend-item"><span class="legend-dot ld-ab"></span>theme</span>
          <span class="legend-item"><span class="legend-dot ld-d"></span>develop</span>
          <span class="legend-item"><span class="legend-dot ld-c"></span>climax</span>
          <span class="legend-item"><span class="legend-dot ld-r"></span>resolve</span>
        </div>
        <span class="arc-description" id="arcDescription"></span>
      </div>
    </section>

    <!-- Right: input + analysis -->
    <section class="control-section">

      <div class="input-block">
        <label class="input-label" for="sceneInput">Scene description</label>
        <textarea id="sceneInput" rows="3"
          placeholder="a detective walking through a rainy city at night…"></textarea>
        <div class="input-meta">
          <span class="input-hint">press Enter to analyse</span>
          <span class="char-count" id="charCount">0</span>
        </div>
        <div class="button-row">
          <button class="btn-generate" id="playBtn" disabled>
            <span class="btn-icon">▶</span> Play
          </button>
          <button class="btn-stop" id="stopBtn" disabled>■</button>
        </div>
      </div>

      <div class="analysis-panel" id="analysisPanel">

        <!-- Archetype scores -->
        <div class="panel-section">
          <div class="section-header">
            <span class="section-label">Archetype match</span>
            <span class="dominant-badge" id="dominantBadge"></span>
          </div>
          <div class="archetype-scores" id="archetypeScores"></div>
        </div>

        <!-- Detected words -->
        <div class="panel-section" id="detectedSection">
          <span class="section-label">Detected signals</span>
          <div class="detected-tags" id="detectedTags"></div>
        </div>

        <!-- Musical params -->
        <div class="panel-section">
          <span class="section-label">Musical parameters</span>
          <div class="param-grid" id="paramGrid"></div>
        </div>

      </div>

    </section>
  </main>

  <footer>
    <span>Columbia Computational Sound &middot; Spring 2026</span>
    <span>S. Agbekpenou &middot; M. Zhang &middot; A. Livias</span>
  </footer>

  <script type="module" src="js/main.js"></script>
</body>
</html>
