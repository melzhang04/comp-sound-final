<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cinematic Music Engine</title>
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --border: #1e1e2e;
    --text: #c8c8d8;
    --dim: #555570;
    --accent: #7c6af7;
    --accent2: #f76a8a;
    --mono: 'Courier New', monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    min-height: 100vh;
    padding: 2rem;
  }
  h1 {
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--dim);
    margin-bottom: 2rem;
  }
  h1 span { color: var(--accent); }
  .input-row {
    display: flex;
    gap: 0.5rem;
    margin-bottom: 2rem;
  }
  #sceneInput {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    padding: 0.6rem 0.8rem;
    outline: none;
    transition: border-color 0.2s;
  }
  #sceneInput:focus { border-color: var(--accent); }
  #sceneInput::placeholder { color: var(--dim); }
  button {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    padding: 0.6rem 1.2rem;
    cursor: pointer;
    transition: all 0.15s;
  }
  button:hover { border-color: var(--accent); color: var(--accent); }
  button.active, button#stopBtn {
    border-color: var(--accent2);
    color: var(--accent2);
  }
  #output { display: none; }
  .section {
    border: 1px solid var(--border);
    padding: 1rem;
    margin-bottom: 1rem;
  }
  .section-label {
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--dim);
    margin-bottom: 0.8rem;
  }
  .scores-grid { display: flex; flex-direction: column; gap: 0.4rem; }
  .score-row { display: grid; grid-template-columns: 90px 1fr 30px; align-items: center; gap: 0.6rem; }
  .score-name { color: var(--dim); font-size: 12px; }
  .score-name.dominant { color: var(--accent); }
  .bar-track { background: var(--surface); height: 4px; }
  .bar-fill { height: 4px; background: var(--border); transition: width 0.4s; }
  .bar-fill.dominant { background: var(--accent); }
  .score-val { color: var(--dim); text-align: right; font-size: 11px; }
  .params-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 0.4rem;
  }
  .param { display: flex; justify-content: space-between; gap: 1rem; }
  .param-label { color: var(--dim); }
  .param-val { color: var(--text); }
  .ops-section { margin-bottom: 1rem; }
  #opsLog { word-break: break-all; line-height: 1.8; }
  #currentSet { color: var(--dim); font-size: 12px; margin-top: 0.4rem; }
  #currentSet span { color: var(--accent); }
  .op-entry { display: inline-block; padding: 0.1rem 0.3rem; }
  .status-bar {
    font-size: 11px;
    color: var(--dim);
    margin-bottom: 1rem;
    min-height: 1.2em;
  }
  .status-bar.playing { color: var(--accent); }
  .status-bar.analyzing { color: var(--accent2); }
  .blink { animation: blink 1s step-end infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
  .play-row { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
  #stopBtn { display: none; }
</style>
</head>
<body>
<h1><span>///</span> Cinematic Music Engine — NRC Lexicon</h1>

<div class="input-row">
  <input id="sceneInput" type="text" placeholder="describe a scene… (press Enter)" autocomplete="off">
</div>

<div class="status-bar" id="statusBar"></div>

<div id="output">
  <div class="play-row">
    <button id="playBtn" disabled>▶ Play</button>
    <button id="stopBtn">■ Stop</button>
  </div>

  <div class="section">
    <div class="section-label">Archetype Scores</div>
    <div class="scores-grid" id="scoresGrid"></div>
  </div>

  <div class="section">
    <div class="section-label">Music Parameters</div>
    <div class="params-grid">
      <div class="param"><span class="param-label">archetype</span><span class="param-val" id="pArchetype">—</span></div>
      <div class="param"><span class="param-label">scale</span><span class="param-val" id="pScale">—</span></div>
      <div class="param"><span class="param-label">tempo</span><span class="param-val" id="pTempo">—</span></div>
      <div class="param"><span class="param-label">FM ratio</span><span class="param-val" id="pFM">—</span></div>
      <div class="param"><span class="param-label">reverb</span><span class="param-val" id="pReverb">—</span></div>
      <div class="param"><span class="param-label">density</span><span class="param-val" id="pDensity">—</span></div>
      <div class="param"><span class="param-label">dynamics</span><span class="param-val" id="pDynamics">—</span></div>
      <div class="param"><span class="param-label">filter</span><span class="param-val" id="pFilter">—</span></div>
    </div>
  </div>

  <div class="section ops-section">
    <div class="section-label">Pitch Set Operations</div>
    <div id="opsLog"><span style="color:var(--dim)">Awaiting first phrase…</span></div>
    <div id="currentSet">Current set: <span>—</span></div>
  </div>
</div>

// ─── ARCHETYPES & PRESETS ────────────────────────────────────────────────────
const ARCHETYPES = ['tense','romantic','epic','mysterious','peaceful','melancholic'];

const PRESETS = {
  tense:      {tempoBase:68,tempoRange:16,scale:'phrygian',fmCarrier:1,fmModulator:2.5,filterType:'highpass',filterFreq:900,reverbWet:0.25,rhythmDensity:0.3,dynamics:0.55},
  romantic:   {tempoBase:64,tempoRange:14,scale:'major',fmCarrier:1,fmModulator:1.5,filterType:'lowpass',filterFreq:1400,reverbWet:0.5,rhythmDensity:0.5,dynamics:0.5},
  epic:       {tempoBase:118,tempoRange:28,scale:'minor',fmCarrier:1,fmModulator:3.0,filterType:'lowpass',filterFreq:2200,reverbWet:0.55,rhythmDensity:0.8,dynamics:0.85},
  mysterious: {tempoBase:54,tempoRange:14,scale:'dorian',fmCarrier:1,fmModulator:4.0,filterType:'bandpass',filterFreq:700,reverbWet:0.7,rhythmDensity:0.35,dynamics:0.45},
  peaceful:   {tempoBase:76,tempoRange:18,scale:'lydian',fmCarrier:1,fmModulator:1.2,filterType:'lowpass',filterFreq:1800,reverbWet:0.4,rhythmDensity:0.55,dynamics:0.5},
  melancholic:{tempoBase:58,tempoRange:14,scale:'aeolian',fmCarrier:1,fmModulator:2.0,filterType:'lowpass',filterFreq:1000,reverbWet:0.5,rhythmDensity:0.4,dynamics:0.45},
};

// ─── PITCH SET THEORY ─────────────────────────────────────────────────────────
const ARCHETYPE_PITCH_SETS = {
  tense:      [0,1,3,4,6],
  romantic:   [0,2,4,7,9],
  epic:       [0,2,5,7,10],
  mysterious: [0,1,4,6,8],
  peaceful:   [0,2,4,6,9],
  melancholic:[0,2,3,7,8],
};

function transpose(pitchSet, n) { return pitchSet.map(p => (p + n) % 12); }
function invert(pitchSet) { const f = pitchSet[0]; return pitchSet.map(p => (f*2-p+12)%12); }
function retrograde(pitchSet) { return [...pitchSet].reverse(); }
function retrogradInverse(pitchSet) { return retrograde(invert(pitchSet)); }
const OPS = ['T','I','R','RI'];

function applyRandomOp(pitchSet) {
  const op = OPS[Math.floor(Math.random()*OPS.length)];
  let result, label;
  if (op==='T') { const n=Math.floor(Math.random()*11)+1; result=transpose(pitchSet,n); label=`T${n}`; }
  else if (op==='I') { result=invert(pitchSet); label='I'; }
  else if (op==='R') { result=retrograde(pitchSet); label='R'; }
  else { result=retrogradInverse(pitchSet); label='RI'; }
  return { result, label };
}

function pitchSetToFreqs(pitchSet, rootHz) {
  return pitchSet.map(pc => rootHz * Math.pow(2, pc/12));
}

// ─── SCENE PARSER ─────────────────────────────────────────────────────────────
function tokenize(text) {
  return text.toLowerCase().replace(/[^a-z\s]/g,' ').split(/\s+/).filter(Boolean);
}

function parseScene(description) {
  const tokens = tokenize(description);
  const scores = Object.fromEntries(ARCHETYPES.map(a => [a, 0]));

  for (const token of tokens) {
    const entry = NRC_LEXICON[token];
    if (entry) {
      for (const [a, v] of Object.entries(entry)) {
        if (scores[a] !== undefined) scores[a] += v;
      }
    }
  }

  const total = Object.values(scores).reduce((a,b) => a+b, 0);
  let dominant = 'mysterious';
  let maxScore = -1;
  for (const [name, score] of Object.entries(scores)) {
    if (score > maxScore) { maxScore = score; dominant = name; }
  }

  function blendParam(field) {
    if (total === 0) return PRESETS[dominant][field];
    let v = 0;
    for (const [name, score] of Object.entries(scores)) v += (score/total) * PRESETS[name][field];
    return v;
  }

  const preset = PRESETS[dominant];
  return {
    archetype: dominant,
    tempo: Math.round(blendParam('tempoBase') + (Math.random()*blendParam('tempoRange') - blendParam('tempoRange')/2)),
    scale: preset.scale,
    fmCarrier: preset.fmCarrier,
    fmModulator: Math.round(blendParam('fmModulator')*10)/10,
    filterType: preset.filterType,
    filterFreq: Math.round(blendParam('filterFreq')),
    reverbWet: Math.round(blendParam('reverbWet')*100)/100,
    rhythmDensity: Math.round(blendParam('rhythmDensity')*100)/100,
    dynamics: Math.round(blendParam('dynamics')*100)/100,
    scores,
  };
}

// ─── WEBAUDIO FM ENGINE ───────────────────────────────────────────────────────
let audioCtx = null, isPlaying = false, stopFlag = false;
let currentParams = null, masterGain = null;

function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function createReverb(ctx) {
  const convolver = ctx.createConvolver();
  const len = ctx.sampleRate * 2.5;
  const buf = ctx.createBuffer(2, len, ctx.sampleRate);
  for (let ch = 0; ch < 2; ch++) {
    const data = buf.getChannelData(ch);
    for (let i = 0; i < len; i++) data[i] = (Math.random()*2-1)*Math.pow(1-i/len,2.5);
  }
  convolver.buffer = buf;
  return convolver;
}

function playFMNote(ctx, freq, duration, startTime, params, destination) {
  const { fmCarrier, fmModulator, dynamics } = params;
  const modFreq = freq * fmModulator;
  const modulator = ctx.createOscillator();
  const modGain = ctx.createGain();
  modulator.type = 'sine';
  modulator.frequency.setValueAtTime(modFreq, startTime);
  const modIndex = modFreq * 2.5 * dynamics;
  modGain.gain.setValueAtTime(modIndex, startTime);
  modGain.gain.exponentialRampToValueAtTime(modIndex*0.1, startTime+duration*0.8);
  modulator.connect(modGain);
  const carrier = ctx.createOscillator();
  const envGain = ctx.createGain();
  carrier.type = 'sine';
  carrier.frequency.setValueAtTime(freq*fmCarrier, startTime);
  modGain.connect(carrier.frequency);
  const peak = 0.18 * dynamics;
  envGain.gain.setValueAtTime(0, startTime);
  envGain.gain.linearRampToValueAtTime(peak, startTime+0.02);
  envGain.gain.exponentialRampToValueAtTime(peak*0.6, startTime+duration*0.4);
  envGain.gain.exponentialRampToValueAtTime(0.0001, startTime+duration);
  carrier.connect(envGain);
  envGain.connect(destination);
  modulator.start(startTime); modulator.stop(startTime+duration+0.05);
  carrier.start(startTime); carrier.stop(startTime+duration+0.05);
}

function startDrone(ctx, freqs, params, destination) {
  const droneGain = ctx.createGain();
  droneGain.gain.setValueAtTime(0, ctx.currentTime);
  droneGain.gain.linearRampToValueAtTime(0.08*params.dynamics, ctx.currentTime+2.0);
  freqs.slice(0,3).forEach((freq, i) => {
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = i===0 ? 'sine' : 'triangle';
    osc.frequency.setValueAtTime(freq*0.5, ctx.currentTime);
    gain.gain.setValueAtTime(0.03, ctx.currentTime);
    osc.connect(gain); gain.connect(droneGain); osc.start();
  });
  droneGain.connect(destination);
  return droneGain;
}

async function startMusic(params) {
  stopFlag = false; isPlaying = true;
  const ctx = getAudioCtx();
  if (ctx.state === 'suspended') await ctx.resume();
  masterGain = ctx.createGain();
  masterGain.gain.setValueAtTime(0.7, ctx.currentTime);
  const filterNode = ctx.createBiquadFilter();
  filterNode.type = params.filterType;
  filterNode.frequency.setValueAtTime(params.filterFreq, ctx.currentTime);
  filterNode.Q.setValueAtTime(0.8, ctx.currentTime);
  const reverbNode = createReverb(ctx);
  const reverbGain = ctx.createGain();
  reverbGain.gain.setValueAtTime(params.reverbWet, ctx.currentTime);
  const dryGain = ctx.createGain();
  dryGain.gain.setValueAtTime(1-params.reverbWet*0.5, ctx.currentTime);
  const compressor = ctx.createDynamicsCompressor();
  compressor.threshold.setValueAtTime(-18, ctx.currentTime);
  compressor.ratio.setValueAtTime(4, ctx.currentTime);
  masterGain.connect(filterNode);
  filterNode.connect(dryGain); filterNode.connect(reverbNode);
  reverbNode.connect(reverbGain);
  dryGain.connect(compressor); reverbGain.connect(compressor);
  compressor.connect(ctx.destination);
  const rootHz = 130.81;
  let currentSet = [...ARCHETYPE_PITCH_SETS[params.archetype]];
  const initialFreqs = pitchSetToFreqs(currentSet, rootHz);
  startDrone(ctx, initialFreqs, params, masterGain);
  const beatDuration = 60/params.tempo;
  const opLabels = [];
  updateOpsLog(opLabels); updateCurrentSet(currentSet);
  let phraseCount = 0;
  while (!stopFlag) {
    phraseCount++;
    if (phraseCount > 1) {
      const { result, label } = applyRandomOp(currentSet);
      currentSet = result; opLabels.push(label);
      if (opLabels.length > 12) opLabels.shift();
      updateOpsLog(opLabels); updateCurrentSet(currentSet);
    }
    const freqs = pitchSetToFreqs(currentSet, rootHz);
    const noteCount = 6 + Math.floor(params.rhythmDensity*6);
    const noteDuration = beatDuration*1.4;
    const phraseLen = noteCount*noteDuration*1000;
    let t = ctx.currentTime;
    for (let i = 0; i < noteCount; i++) {
      if (stopFlag) break;
      if (Math.random() >= 0.15) {
        const octave = Math.random() < 0.3 ? 2 : 1;
        const freq = freqs[Math.floor(Math.random()*freqs.length)] * octave;
        playFMNote(ctx, freq, noteDuration*(0.5+Math.random()*0.7), t, params, masterGain);
      }
      t += noteDuration;
    }
    setStatus('playing', `Phrase ${phraseCount} · ${params.archetype} · ${params.tempo} bpm`);
    await sleep(phraseLen);
  }
  masterGain.gain.setValueAtTime(masterGain.gain.value, ctx.currentTime);
  masterGain.gain.linearRampToValueAtTime(0, ctx.currentTime+1.5);
  await sleep(1600);
  isPlaying = false; updatePlayStop(false); setStatus('','');
}

function stopMusic() { stopFlag = true; }
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

// ─── UI ───────────────────────────────────────────────────────────────────────
const opsLogEl = document.getElementById('opsLog');
const currentSetEl = document.getElementById('currentSet');
const statusBar = document.getElementById('statusBar');

function updateOpsLog(labels) {
  if (!labels.length) { opsLogEl.innerHTML = '<span style="color:var(--dim)">Awaiting first phrase…</span>'; return; }
  opsLogEl.innerHTML = labels.map((l,i) => {
    const latest = i===labels.length-1;
    return `<span class="op-entry" style="${latest?'color:var(--accent);font-weight:700':''}">${l}</span>`;
  }).join(' → ');
}

function updateCurrentSet(set) {
  currentSetEl.innerHTML = `Current set: <span>[${set.join(', ')}]</span>`;
}

function setStatus(type, msg) {
  statusBar.className = `status-bar${type?' '+type:''}`;
  statusBar.innerHTML = type==='playing' ? `<span class="blink">●</span> ${msg}` : msg;
}

function updatePlayStop(playing) {
  const playBtn = document.getElementById('playBtn');
  const stopBtn = document.getElementById('stopBtn');
  if (playing) { playBtn.style.display='none'; stopBtn.style.display=''; }
  else { playBtn.style.display=''; stopBtn.style.display='none'; playBtn.classList.remove('active'); }
}

function analyzeScene(text) {
  setStatus('analyzing','Analysing…');
  const p = parseScene(text);
  currentParams = p;
  const maxScore = Math.max(...Object.values(p.scores), 1);
  const grid = document.getElementById('scoresGrid');
  grid.innerHTML = Object.entries(p.scores)
    .sort((a,b) => b[1]-a[1])
    .map(([name, score]) => {
      const isDom = name===p.archetype;
      const pct = Math.round((score/maxScore)*100);
      return `<div class="score-row">
        <div class="score-name${isDom?' dominant':''}">${name}</div>
        <div class="bar-track"><div class="bar-fill${isDom?' dominant':''}" style="width:${pct}%"></div></div>
        <div class="score-val">${score}</div>
      </div>`;
    }).join('');
  document.getElementById('pArchetype').textContent = p.archetype;
  document.getElementById('pScale').textContent = p.scale;
  document.getElementById('pTempo').textContent = p.tempo+' bpm';
  document.getElementById('pFM').textContent = p.fmCarrier+':'+p.fmModulator;
  document.getElementById('pReverb').textContent = p.reverbWet;
  document.getElementById('pDensity').textContent = p.rhythmDensity;
  document.getElementById('pDynamics').textContent = p.dynamics;
  document.getElementById('pFilter').textContent = p.filterType+' @ '+p.filterFreq+' Hz';
  updateOpsLog([]);
  updateCurrentSet(ARCHETYPE_PITCH_SETS[p.archetype]);
  document.getElementById('output').style.display = 'block';
  document.getElementById('playBtn').disabled = false;
  setStatus('','Ready · press Play to perform');
}

document.getElementById('sceneInput').addEventListener('keydown', e => {
  if (e.key!=='Enter'||e.shiftKey) return;
  e.preventDefault();
  const text = e.target.value.trim();
  if (text) analyzeScene(text);
});

document.getElementById('playBtn').addEventListener('click', () => {
  if (!currentParams||isPlaying) return;
  document.getElementById('playBtn').classList.add('active');
  updatePlayStop(true);
  startMusic(currentParams);
});

document.getElementById('stopBtn').addEventListener('click', () => {
  stopMusic(); updatePlayStop(false); setStatus('','');
});
</script>
</body>
</html>
